<div class="not-found-container">
  <div class="not-found-card">
    <mat-icon class="not-found-icon">explore_off</mat-icon>
    <h1 class="not-found-code">404</h1>
    <h2 class="not-found-title">Page Not Found</h2>
    <p class="not-found-message">The page you're looking for doesn't exist or has been moved.</p>
    <button mat-flat-button color="primary" class="not-found-btn" (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
      Go Back
    </button>
  </div>
</div>
